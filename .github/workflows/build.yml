name: Build Human Typer

# Builds the distributable apps in the cloud:
#   - Windows  -> HumanTyper.exe            (single-file app, no zip to extract)
#   - macOS    -> HumanTyper-macOS.zip      (ONE universal2 build: native on both
#                                            Apple Silicon and Intel Macs)
#
# The macOS build is universal2, produced entirely on the arm64 runner using the
# python.org universal2 interpreter. That removes any dependence on Intel runners
# (GitHub retired macos-13 in Dec 2025; the macos-*-intel images sunset Aug 2027).
#
# Trigger it two ways:
#   1. Manually: GitHub -> Actions -> "Build Human Typer" -> Run workflow.
#   2. By tag:   push a version tag (e.g. v1.0.0) -> also publishes a GitHub Release.

on:
  workflow_dispatch:        # the manual "Run workflow" button
  push:
    tags: [ 'v*' ]          # e.g. v1.0.0 -> also makes a Release

permissions:
  contents: write           # lets the jobs create/update Releases

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt pyinstaller

      - name: Build the app
        run: python -m PyInstaller --noconfirm --clean HumanTyper.spec

      - name: Gate on the frozen bundle's self-check
        # The built exe must be able to import its native-window stack (webview,
        # clr, clr_loader) from INSIDE the frozen bundle, or buyers get the
        # browser-fallback experience. --diag exits non-zero on a broken bundle.
        shell: pwsh
        run: |
          $p = Start-Process -FilePath "dist/HumanTyper.exe" `
                 -ArgumentList "--diag","--diag-out","diag.json" -Wait -PassThru
          if (Test-Path diag.json) { Get-Content diag.json } else { Write-Error "diag.json was not written"; exit 1 }
          if ($p.ExitCode -ne 0) { Write-Error "frozen bundle failed its self-check (exit $($p.ExitCode))"; exit 1 }

      - name: Upload build artifact
        # The single exe IS the download — no zip, nothing to extract.
        uses: actions/upload-artifact@v4
        with:
          name: HumanTyper-Windows
          path: dist/HumanTyper.exe
          if-no-files-found: error

  build-macos:
    name: macOS (universal)
    runs-on: macos-latest        # arm64; we build a fat binary that also runs on Intel
    timeout-minutes: 30
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install universal2 Python (python.org)
        # setup-python ships single-arch builds; PyInstaller's universal2 target
        # needs a universal2 interpreter, which the python.org pkg provides.
        run: |
          PY=3.12.8
          PKG="python-${PY}-macos11.pkg"
          curl -fsSLO "https://www.python.org/ftp/python/${PY}/${PKG}"
          sudo installer -pkg "$PKG" -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"

      - name: Confirm the interpreter is universal2
        run: |
          which python3
          python3 --version
          lipo -archs "$(python3 -c 'import sys; print(sys.executable)')"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip wheel
          python3 -m pip install -r requirements.txt pyinstaller

      - name: Build the app (universal2)
        run: python3 -m PyInstaller --noconfirm --clean HumanTyper.spec

      - name: Verify the binary is universal (x86_64 + arm64)
        run: |
          BIN="dist/Human Typer.app/Contents/MacOS/HumanTyper"
          echo "archs: $(lipo -archs "$BIN")"
          lipo -archs "$BIN" | grep -q x86_64 && lipo -archs "$BIN" | grep -q arm64 \
            || { echo "ERROR: not a universal binary"; exit 1; }

      - name: Gate on the frozen bundle's self-check
        # Print the report even when the check fails, so the log shows WHY.
        run: |
          status=0
          "dist/Human Typer.app/Contents/MacOS/HumanTyper" --diag --diag-out diag.json || status=$?
          cat diag.json || true
          exit $status

      - name: Sign & notarize
        # No-op (unsigned) unless the Apple secrets are set, so this never breaks builds.
        env:
          APPLE_DEV_ID_CERT_P12: ${{ secrets.APPLE_DEV_ID_CERT_P12 }}
          APPLE_DEV_ID_CERT_PASSWORD: ${{ secrets.APPLE_DEV_ID_CERT_PASSWORD }}
          APPLE_DEV_ID_IDENTITY: ${{ secrets.APPLE_DEV_ID_IDENTITY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: bash ci/sign_notarize_mac.sh "dist/Human Typer.app"

      - name: Package
        # ditto preserves the .app bundle's symlinks/permissions; plain zip can break it.
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Human Typer.app" "HumanTyper-macOS.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HumanTyper-macOS
          path: HumanTyper-macOS.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    # always() so a single flaky build leg can't block publishing the ones that succeeded.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update the Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          # Collect into an array so paths with spaces (e.g. folder names) stay intact.
          mapfile -t files < <(find artifacts -type f)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifacts were produced — nothing to publish."; exit 1
          fi
          printf 'Publishing: %s\n' "${files[@]}"
          gh release create "$tag" --title "Human Typer $tag" --generate-notes "${files[@]}" \
            || gh release upload "$tag" "${files[@]}" --clobber
